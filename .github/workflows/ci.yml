name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run tests with coverage
        run: pnpm test:coverage
        continue-on-error: true

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 14

      - name: Upload shared coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: packages/shared/coverage/
          retention-days: 14

      - name: Upload kit-plugin coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-kit-plugin
          path: apps/kit-plugin/coverage/
          retention-days: 14
