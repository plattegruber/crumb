name = "crumb-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ---------- Bindings ----------
# Note: The placeholder IDs below are fine for local development.
# Wrangler automatically creates local D1/KV/R2 instances for `wrangler dev`.
# Replace these with real IDs only when deploying to Cloudflare.

[[d1_databases]]
binding = "DB"
database_name = "crumb-db"
database_id = "placeholder-database-id"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "crumb-storage"

[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-kv-namespace-id"

[[queues.producers]]
binding = "IMPORT_QUEUE"
queue = "crumb-import-pipeline"

[[queues.producers]]
binding = "RENDER_QUEUE"
queue = "crumb-render-pipeline"

[[queues.consumers]]
queue = "crumb-import-pipeline"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

[[queues.consumers]]
queue = "crumb-render-pipeline"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3

# ---------- Environment Variables ----------

[vars]
CLERK_PUBLISHABLE_KEY = "pk_test_placeholder"
LOG_LEVEL = "info"
# KIT_CLIENT_ID = "placeholder"  # Optional — only needed for production OAuth flow

# ---------- Local Development ----------

[dev]
port = 8787
# Local D1/KV/R2 state persists to .wrangler/state/ by default across
# restarts. Override with: npx wrangler dev --persist-to <dir>
