name = "dough-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ---------- Bindings ----------
# Note: The placeholder IDs below are fine for local development.
# Wrangler automatically creates local D1/KV/R2 instances for `wrangler dev`.
# Replace these with real IDs only when deploying to Cloudflare.

[[d1_databases]]
binding = "DB"
database_name = "dough-db"
database_id = "7cef4dc3-6c4e-451b-b9ed-de392228f6a7"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "dough-storage"

[[kv_namespaces]]
binding = "CACHE"
id = "90c34b4e518e442abb8522d69b56979e"

[[queues.producers]]
binding = "IMPORT_QUEUE"
queue = "dough-import-pipeline"

[[queues.producers]]
binding = "RENDER_QUEUE"
queue = "dough-render-pipeline"

[[queues.consumers]]
queue = "dough-import-pipeline"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

[[queues.consumers]]
queue = "dough-render-pipeline"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3

# ---------- Workers AI ----------

[ai]
binding = "AI"

# ---------- Environment Variables ----------

[vars]
CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsubWFrZWRvdWdoLmFwcCQ"
LOG_LEVEL = "info"
# KIT_CLIENT_ID = "placeholder"  # Optional — only needed for production OAuth flow

# ---------- Local Development ----------

[dev]
port = 8787
# Local D1/KV/R2 state persists to .wrangler/state/ by default across
# restarts. Override with: npx wrangler dev --persist-to <dir>
