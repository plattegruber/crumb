name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual deploys

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: 6f9565cb51f0bb050c420ca18dfff22f

jobs:
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: apps/api

  deploy-web:
    name: Deploy Dashboard (Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dough/web build
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/web/.svelte-kit/cloudflare --project-name=dough-web --branch=main

  deploy-docs:
    name: Deploy Docs (Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter docs build
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/docs/dist --project-name=dough-docs --branch=main

  deploy-marketing:
    name: Deploy Marketing Site (Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dough/marketing build
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/marketing/build --project-name=dough-marketing --branch=main
